name: Build Neovim & Neovim-Qt (CentOS 7 Fixed)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: centos:7
    steps:
      - name: Fix CentOS 7 Repos (Vault All-in-One)
        run: |
          # 1. 立即停止使用已经消失的 mirrorlist，并指向 vault 存档
          find /etc/yum.repos.d/ -name "*.repo" -exec sed -i 's|^mirrorlist=|#mirrorlist=|g' {} +
          find /etc/yum.repos.d/ -name "*.repo" -exec sed -i 's|^#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' {} +
          find /etc/yum.repos.d/ -name "*.repo" -exec sed -i 's|^baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' {} +

          # 2. 安装 SCL 和 EPEL (安装后会生成新的 .repo 文件，需要再次修复)
          yum install -y centos-release-scl epel-release

          # 3. 再次强制修复所有新生成的 repo 文件 (解决你图片中的 centos-sclo-rh 报错)
          find /etc/yum.repos.d/ -name "*.repo" -exec sed -i 's|^mirrorlist=|#mirrorlist=|g' {} +
          find /etc/yum.repos.d/ -name "*.repo" -exec sed -i 's|^#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' {} +
          find /etc/yum.repos.d/ -name "*.repo" -exec sed -i 's|^baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' {} +

          # 4. 验证并安装工具链
          yum install -y --nogpgcheck devtoolset-11-gcc devtoolset-11-gcc-c++ \
                         make git patch unzip gettext-devel \
                         qt5-qtbase-devel qt5-qtsvg-devel \
                         wget curl tar gzip

      - name: Install Modern CMake
        run: |
          wget https://github.com/Kitware/CMake/releases/download/v3.26.4/cmake-3.26.4-linux-x86_64.sh
          sh cmake-3.26.4-linux-x86_64.sh --skip-license --prefix=/usr/local

      - name: Build Neovim Core (v0.11.x)
        shell: bash
        run: |
          source /opt/rh/devtoolset-11/enable
          git clone --depth 1 https://github.com/neovim/neovim.git nvim-src
          
          cd nvim-src
          # 使用 USE_BUNDLED=ON 避免依赖系统的旧库
          make CMAKE_BUILD_TYPE=Release \
               CMAKE_EXTRA_FLAGS="-DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/nvim-dist -DUSE_BUNDLED=ON" \
               LDFLAGS="-static-libstdc++ -static-libgcc"
          make install

      - name: Build Neovim-Qt
        shell: bash
        run: |
          source /opt/rh/devtoolset-11/enable
          git clone --depth 1 https://github.com/equalsraf/neovim-qt.git
          cd neovim-qt
          mkdir build && cd build
          /usr/local/bin/cmake -DCMAKE_BUILD_TYPE=Release \
                 -DQT_QMAKE_EXECUTABLE=/usr/bin/qmake-qt5 \
                 -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/nvim-dist \
                 -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc" ..
          make -j$(nproc)
          make install

      - name: Create Bundle
        run: |
          cd $GITHUB_WORKSPACE
          tar -czvf nvim-centos7-x86_64.tar.gz -C nvim-dist .

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: nvim-centos7-fixed
          path: nvim-centos7-x86_64.tar.gz
