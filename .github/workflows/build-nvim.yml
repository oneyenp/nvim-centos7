name: Build Neovim & Neovim-Qt (CentOS 7 EOL Optimized)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: centos:7
    steps:
      - name: Fix CentOS 7 Repos (Vault Mirror)
        run: |
          # 1. 修复基础仓库指向 Vault 存档
          sed -i s/mirror.centos.org/vault.centos.org/g /etc/yum.repos.d/*.repo
          sed -i s/^#.*baseurl=http/baseurl=http/g /etc/yum.repos.d/*.repo
          sed -i s/^mirrorlist=http/#mirrorlist=http/g /etc/yum.repos.d/*.repo

          # 2. 安装 SCL 和 EPEL
          yum install -y centos-release-scl epel-release

          # 3. 修复 SCL 仓库指向 Vault (核心修复)
          find /etc/yum.repos.d/ -name "CentOS-SCLo*.repo" -exec sed -i 's|^mirrorlist=|#mirrorlist=|g' {} +
          find /etc/yum.repos.d/ -name "CentOS-SCLo*.repo" -exec sed -i 's|^baseurl=http://mirror.centos.org/centos/7/sclo/|baseurl=http://vault.centos.org/centos/7/sclo/|g' {} +

          # 4. 安装工具链
          yum install -y --nogpgcheck devtoolset-11-gcc devtoolset-11-gcc-c++ \
                         make git patch unzip gettext-devel \
                         qt5-qtbase-devel qt5-qtsvg-devel \
                         wget curl tar gzip

      - name: Install Modern CMake
        run: |
          wget https://github.com/Kitware/CMake/releases/download/v3.26.4/cmake-3.26.4-linux-x86_64.sh
          sh cmake-3.26.4-linux-x86_64.sh --skip-license --prefix=/usr/local

      - name: Build Neovim Core (v0.11.x)
        shell: bash
        run: |
          source /opt/rh/devtoolset-11/enable
          # 克隆 master 分支 (0.11 处于开发状态) 或指定 tag
          git clone --depth 1 https://github.com/neovim/neovim.git nvim-src
          
          cd nvim-src
          # USE_BUNDLED=ON 极其重要：它会下载并静态编译所有依赖，避免链接 CentOS 7 过时的库
          make CMAKE_BUILD_TYPE=Release \
               CMAKE_EXTRA_FLAGS="-DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/nvim-dist -DUSE_BUNDLED=ON" \
               LDFLAGS="-static-libstdc++ -static-libgcc"
          make install

      - name: Build Neovim-Qt
        shell: bash
        run: |
          source /opt/rh/devtoolset-11/enable
          git clone --depth 1 https://github.com/equalsraf/neovim-qt.git
          cd neovim-qt
          mkdir build && cd build
          /usr/local/bin/cmake -DCMAKE_BUILD_TYPE=Release \
                 -DQT_QMAKE_EXECUTABLE=/usr/bin/qmake-qt5 \
                 -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/nvim-dist \
                 -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc" ..
          make -j$(nproc)
          make install

      - name: Create Bundle
        run: |
          cd $GITHUB_WORKSPACE
          # 创建一个包含核心和 GUI 的压缩包
          tar -czvf nvim-centos7-x86_64.tar.gz -C nvim-dist .

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: nvim-centos7-static-linked
          path: nvim-centos7-x86_64.tar.gz
