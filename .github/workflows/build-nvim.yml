name: Build Neovim & Neovim-Qt for CentOS 7
on:
  workflow_dispatch: # 手动触发

jobs:
  build-centos7:
    runs-on: ubuntu-latest
    container:
      image: centos:7 # 核心：确保 GLIBC 版本为 2.17
    steps:
      - name: Prepare CentOS 7 Environment
        run: |
          # 1. 替换失效的镜像源 (CentOS 7 官方源已停止维护)
          sed -i s/mirror.centos.org/vault.centos.org/g /etc/yum.repos.d/*.repo
          sed -i s/^#.*baseurl=http/baseurl=http/g /etc/yum.repos.d/*.repo
          sed -i s/^mirrorlist=http/#mirrorlist=http/g /etc/yum.repos.d/*.repo
          
          # 2. 安装基础构建工具
          yum install -y centos-release-scl epel-release
          yum install -y devtoolset-11-gcc devtoolset-11-gcc-c++ \
                         make git patch unzip gettext-devel \
                         qt5-qtbase-devel qt5-qtsvg-devel \
                         wget curl tar gzip

      - name: Install Modern CMake
        run: |
          # Neovim 0.11 需要 3.10+ 的 CMake
          wget https://github.com/Kitware/CMake/releases/download/v3.26.4/cmake-3.26.4-linux-x86_64.sh
          sh cmake-3.26.4-linux-x86_64.sh --skip-license --prefix=/usr/local

      - name: Build Neovim Core (0.11.x)
        shell: bash
        run: |
          source /opt/rh/devtoolset-11/enable
          git clone --depth 1 --branch v0.10.4 https://github.com/neovim/neovim.git nvim-src
          # 注：截至2024年中，0.11处于开发分支，如果需要特定tag请自行修改
          
          cd nvim-src
          # 编译所有内置依赖，并强制静态链接 C++ 库
          make CMAKE_BUILD_TYPE=RelWithDebInfo \
               CMAKE_EXTRA_FLAGS="-DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/nvim-dist -DENABLE_JIT=ON" \
               LDFLAGS="-static-libstdc++ -static-libgcc"
          make install

      - name: Build Neovim-Qt
        shell: bash
        run: |
          source /opt/rh/devtoolset-11/enable
          git clone --depth 1 https://github.com/equalsraf/neovim-qt.git
          cd neovim-qt
          mkdir build && cd build
          /usr/local/bin/cmake -DCMAKE_BUILD_TYPE=Release \
                 -DQT_QMAKE_EXECUTABLE=/usr/bin/qmake-qt5 \
                 -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/nvim-dist \
                 -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc" ..
          make -j$(nproc)
          make install

      - name: Package Binaries
        run: |
          # 将 nvim-qt 移动到 nvim 的 bin 目录以便统一打包
          cd $GITHUB_WORKSPACE
          tar -czvf nvim-centos7-x86_64.tar.gz -C nvim-dist .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nvim-centos7-bundle
          path: nvim-centos7-x86_64.tar.gz
