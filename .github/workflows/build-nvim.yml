name: Build Neovim & Neovim-Qt CentOS7

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate CentOS7 build script
        run: |
          cat > build-centos7.sh <<'SCRIPT_EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          export PATH=/usr/local/bin:/usr/local/sbin:/usr/bin:/usr/sbin:/bin:/sbin
          export BUILD_ROOT=/work_dir
          export INSTALL_ROOT=/work_dir/nvim-dist
          export NVIM_VERSION=v0.11.7
          export CMAKE_VERSION=3.26.4

          cd "${BUILD_ROOT}"

          echo "==== Fix CentOS 7 repos ===="
          rm -f /etc/yum.repos.d/*.repo

          cat > /etc/yum.repos.d/CentOS-Vault.repo <<'REPO_EOF'
          [base]
          name=CentOS-7.9.2009 - Base
          baseurl=http://vault.centos.org/7.9.2009/os/$basearch/
          enabled=1
          gpgcheck=0

          [updates]
          name=CentOS-7.9.2009 - Updates
          baseurl=http://vault.centos.org/7.9.2009/updates/$basearch/
          enabled=1
          gpgcheck=0

          [extras]
          name=CentOS-7.9.2009 - Extras
          baseurl=http://vault.centos.org/7.9.2009/extras/$basearch/
          enabled=1
          gpgcheck=0

          [sclo]
          name=CentOS-7.9.2009 - SCLo
          baseurl=http://vault.centos.org/7.9.2009/sclo/$basearch/sclo/
          enabled=1
          gpgcheck=0

          [sclo-rh]
          name=CentOS-7.9.2009 - SCLo RH
          baseurl=http://vault.centos.org/7.9.2009/sclo/$basearch/rh/
          enabled=1
          gpgcheck=0

          [epel]
          name=EPEL 7 Archive
          baseurl=https://archives.fedoraproject.org/pub/archive/epel/7/$basearch/
          enabled=1
          gpgcheck=0
          REPO_EOF

          yum clean all
          yum makecache -y

          echo "==== Install dependencies ===="
          yum install -y --nogpgcheck \
            devtoolset-11-gcc devtoolset-11-gcc-c++ \
            make git patch unzip gettext-devel \
            qt5-qtbase-devel qt5-qtsvg-devel \
            wget curl tar gzip xz file which \
            libtool automake autoconf pkgconfig

          echo "==== Install CMake ===="
          wget -q https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/cmake-${CMAKE_VERSION}-linux-x86_64.sh
          sh cmake-${CMAKE_VERSION}-linux-x86_64.sh --skip-license --prefix=/usr/local

          source /opt/rh/devtoolset-11/enable

          export CFLAGS="-D_DEFAULT_SOURCE -D_BSD_SOURCE"
          export CXXFLAGS="-D_DEFAULT_SOURCE -D_BSD_SOURCE"
          export CPPFLAGS="-D_DEFAULT_SOURCE -D_BSD_SOURCE"

          rm -rf "${INSTALL_ROOT}" nvim-src neovim-qt
          mkdir -p "${INSTALL_ROOT}"

          echo "==== Build Neovim ${NVIM_VERSION} ===="
          git clone --depth 1 --branch "${NVIM_VERSION}" https://github.com/neovim/neovim.git nvim-src
          cd nvim-src

          make -j"$(nproc)" \
            CMAKE_BUILD_TYPE=Release \
            CMAKE_EXTRA_FLAGS="-DCMAKE_INSTALL_PREFIX=${INSTALL_ROOT} -DUSE_BUNDLED=ON -DCMAKE_C_FLAGS=-D_DEFAULT_SOURCE\ -D_BSD_SOURCE -DCMAKE_CXX_FLAGS=-D_DEFAULT_SOURCE\ -D_BSD_SOURCE" \
            LDFLAGS="-static-libstdc++ -static-libgcc"

          make install
          cd "${BUILD_ROOT}"

          echo "==== Build Neovim-Qt Qt5 ===="
          git clone --depth 1 --branch v0.2.18 https://github.com/equalsraf/neovim-qt.git
          cd neovim-qt

          mkdir -p build
          cd build

          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${INSTALL_ROOT}" \
            -DCMAKE_PREFIX_PATH="${INSTALL_ROOT};/usr/lib64/cmake/Qt5" \
            -DQt5_DIR=/usr/lib64/cmake/Qt5 \
            -DQT_QMAKE_EXECUTABLE=/usr/bin/qmake-qt5 \
            -DCMAKE_C_FLAGS="-D_DEFAULT_SOURCE -D_BSD_SOURCE" \
            -DCMAKE_CXX_FLAGS="-D_DEFAULT_SOURCE -D_BSD_SOURCE" \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc"

          make -j"$(nproc)"
          make install
          cd "${BUILD_ROOT}"

          echo "==== Add install script ===="
          cat > "${INSTALL_ROOT}/install.sh" <<'INSTALL_EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          SRC_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          DEFAULT_DIR="$HOME/.local/nvim-centos7"

          echo "Neovim portable package"
          read -rp "Install to [$DEFAULT_DIR]: " TARGET_DIR
          TARGET_DIR="${TARGET_DIR:-$DEFAULT_DIR}"

          mkdir -p "$TARGET_DIR"
          cp -a "$SRC_DIR"/. "$TARGET_DIR"/

          echo "Add to PATH:"
          echo "export PATH=$TARGET_DIR/bin:$PATH"
          INSTALL_EOF

          chmod +x "${INSTALL_ROOT}/install.sh"

          echo "==== Smoke test ===="
          "${INSTALL_ROOT}/bin/nvim" --version | head -10 || true

          echo "==== Packaging ===="
          tar -czf /work_dir/nvim-0.11.7-centos7-x64.tar.gz -C "${INSTALL_ROOT}" .
          ls -lh /work_dir/nvim-0.11.7-centos7-x64.tar.gz
          SCRIPT_EOF

          chmod +x build-centos7.sh

      - name: Build in CentOS 7
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work_dir" \
            -w /work_dir \
            centos:7 \
            /bin/bash /work_dir/build-centos7.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nvim-0.11.7-centos7-x64
          path: nvim-0.11.7-centos7-x64.tar.gz
          if-no-files-found: error
