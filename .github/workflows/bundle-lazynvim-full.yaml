name: Build Neovim CentOS7 Bundle

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (optional)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-and-bundle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate build script
        run: |
          mkdir -p scripts

          cat > scripts/build.sh <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          echo "==== ENV ===="
          uname -a
          cat /etc/centos-release || true

          echo "==== Fix YUM ===="
          rm -f /etc/yum.repos.d/*.repo

          cat > /etc/yum.repos.d/CentOS-Vault.repo <<'EOF'
          [base]
          name=CentOS-7.9.2009 - Base
          baseurl=http://vault.centos.org/7.9.2009/os/x86_64/
          enabled=1
          gpgcheck=0

          [updates]
          name=CentOS-7.9.2009 - Updates
          baseurl=http://vault.centos.org/7.9.2009/updates/x86_64/
          enabled=1
          gpgcheck=0

          [extras]
          name=CentOS-7.9.2009 - Extras
          baseurl=http://vault.centos.org/7.9.2009/extras/x86_64/
          enabled=1
          gpgcheck=0
          EOF

          yum clean all
          yum makecache fast

          echo "==== Install deps ===="
          yum install -y \
            curl tar gzip xz unzip rsync ca-certificates \
            gcc gcc-c++ make findutils which \
            glibc libstdc++ ncurses-libs \
            openssl-devel curl-devel expat-devel zlib-devel perl-devel \
            perl-ExtUtils-MakeMaker \
            gettext gettext-devel

          echo "==== Build Git ===="
          cd /tmp
          curl -L -o git.tar.gz https://www.kernel.org/pub/software/scm/git/git-2.44.0.tar.gz
          tar xzf git.tar.gz
          cd git-2.44.0

          ./configure --prefix=/usr/local
          make -j"$(nproc)" NO_GETTEXT=YesPlease all
          make NO_GETTEXT=YesPlease install

          export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"
          git --version

          echo "==== Install Neovim ===="
          cd /tmp
          curl -L -o nvim.tar.gz \
            https://github.com/neovim/neovim-releases/releases/download/v0.11.7/nvim-linux-x86_64.tar.gz

          tar xzf nvim.tar.gz -C /opt
          export PATH="/opt/nvim-linux-x86_64/bin:$PATH"
          nvim --version

          echo "==== Setup XDG ===="
          export HOME=/root
          export XDG_CONFIG_HOME="$HOME/.config"
          export XDG_DATA_HOME="$HOME/.local/share"
          export XDG_STATE_HOME="$HOME/.local/state"
          export XDG_CACHE_HOME="$HOME/.cache"

          mkdir -p "$XDG_CONFIG_HOME/nvim"

          echo "==== Copy config ===="
          rsync -a /work_dir/ "$XDG_CONFIG_HOME/nvim/" \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "dist" \
            --exclude "scripts" \
            --exclude "*.tar.gz"

          echo "==== Install plugins ===="
          export NVIM_LAZY_NO_FILTER=1
          git config --global protocol.version 2

          nvim --headless "+Lazy! sync" +qa
          nvim --headless "+TSUpdateSync" +qa || true

          echo "==== Build bundle ===="
          OUT=/work_dir/dist
          PKG=$OUT/lazynvim-centos7-bundle

          rm -rf "$OUT"
          mkdir -p "$PKG"

          rsync -a /opt/nvim-linux-x86_64 "$PKG/"

          mkdir -p "$PKG/root"
          rsync -a "$HOME/.config" "$PKG/root/"
          rsync -a "$HOME/.local"  "$PKG/root/"
          rsync -a "$HOME/.cache"  "$PKG/root/" || true

          cat > "$PKG/run-nvim.sh" <<'EOF'
          #!/usr/bin/env bash
          DIR="$(cd "$(dirname "$0")" && pwd)"

          export PATH="$DIR/nvim-linux-x86_64/bin:$PATH"
          export HOME="$DIR/root"
          export XDG_CONFIG_HOME="$HOME/.config"
          export XDG_DATA_HOME="$HOME/.local/share"
          export XDG_STATE_HOME="$HOME/.local/state"
          export XDG_CACHE_HOME="$HOME/.cache"

          exec nvim "$@"
          EOF

          chmod +x "$PKG/run-nvim.sh"

          cd "$OUT"
          tar -czf lazynvim-centos7-bundle.tar.gz lazynvim-centos7-bundle

          echo "==== DIST ===="
          ls -lah "$OUT"

          test -f "$OUT/lazynvim-centos7-bundle.tar.gz"

          echo "==== DONE ===="
          SCRIPT

          chmod +x scripts/build.sh

      - name: Run in CentOS7
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work_dir" \
            -w /work_dir \
            centos:7 \
            /bin/bash /work_dir/scripts/build.sh

      - name: Check dist
        run: |
          ls -lah dist
          test -f dist/lazynvim-centos7-bundle.tar.gz

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lazynvim-centos7-bundle
          path: dist/lazynvim-centos7-bundle.tar.gz

      - name: Resolve Tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          elif [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            TAG="${{ github.event.inputs.release_tag }}"
          else
            TAG="manual-${GITHUB_RUN_NUMBER}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Upload Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "LazyNvim CentOS7 bundle" \
            --repo "$GITHUB_REPOSITORY" || true

          gh release upload "$TAG" \
            dist/lazynvim-centos7-bundle.tar.gz \
            --clobber \
            --repo "$GITHUB_REPOSITORY"
