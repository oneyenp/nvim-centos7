name: Build Neovim CentOS7 Bundle

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-bundle:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 在 CentOS 7 容器内构建
      - name: Build Full Package in CentOS7
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work_dir" \
            -w /work_dir \
            centos:7 \
            /bin/bash -lc '
              set -euo pipefail

              # --- 1. 修复 YUM 源 ---
              rm -f /etc/yum.repos.d/*.repo
              printf "%s\n" \
                "[base]" \
                "name=CentOS-7.9.2009 - Base" \
                "baseurl=http://vault.centos.org/7.9.2009/os/x86_64/" \
                "enabled=1" \
                "gpgcheck=0" \
                "[updates]" \
                "name=CentOS-7.9.2009 - Updates" \
                "baseurl=http://vault.centos.org/7.9.2009/updates/x86_64/" \
                "enabled=1" \
                "gpgcheck=0" \
                "[extras]" \
                "name=CentOS-7.9.2009 - Extras" \
                "baseurl=http://vault.centos.org/7.9.2009/extras/x86_64/" \
                "enabled=1" \
                "gpgcheck=0" \
                > /etc/yum.repos.d/CentOS-Vault.repo

              yum clean all
              yum makecache

              # --- 2. 安装基础依赖 ---
              yum install -y curl tar gzip xz unzip gcc gcc-c++ make findutils which

              # --- 3. 关键：升级 Git ---
              # CentOS 7 默认 Git 1.8 不支持 --filter 选项，需通过 Endpoint 仓库安装 Git 2.x
              yum install -y https://packages.endpointdev.com/endpoint-rpmsign-7L-1.el7.noarch.rpm
              yum install -y git

              # --- 4. 下载 Neovim 二进制 ---
              if [ ! -d "nvim-linux-x86_64" ]; then
                curl -LO https://github.com/neovim/neovim-releases/releases/download/v0.11.7/nvim-linux-x86_64.tar.gz
                tar xzf nvim-linux-x86_64.tar.gz
              fi
              export PATH="/work_dir/nvim-linux-x86_64/bin:$PATH"

              # --- 5. 环境目录准备 ---
              export HOME=/root
              export XDG_CONFIG_HOME="$HOME/.config"
              export XDG_DATA_HOME="$HOME/.local/share"
              export XDG_STATE_HOME="$HOME/.local/state"

              mkdir -p "$XDG_CONFIG_HOME"
              cp -r /work_dir/. "$XDG_CONFIG_HOME/nvim"

              # 清理不需要打包的冗余文件
              rm -rf "$XDG_CONFIG_HOME/nvim/nvim-linux-x86_64"*
              rm -rf "$XDG_CONFIG_HOME/nvim/dist"

              # --- 6. 执行插件安装与 Tree-sitter 编译 ---
              export NVIM_LAZY_NO_FILTER=1
              nvim --headless "+Lazy! sync" +qa
              nvim --headless "+TSUpdateSync" +qa

              # --- 7. 打包产物 ---
              mkdir -p /work_dir/dist
              cd "$HOME"
              tar -czf /work_dir/dist/lazynvim-centos7-bundle.tar.gz \
                .config/nvim \
                .local/share/nvim \
                .local/state/nvim
              
              echo "Build completed successfully."
            '

      # 3. 将打包好的文件上传
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lazynvim-centos7-bundle
          path: dist/lazynvim-centos7-bundle.tar.gz
          retention-days: 5
