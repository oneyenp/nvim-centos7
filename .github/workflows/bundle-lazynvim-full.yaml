name: bundle-lazynvim-full
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Full Package in CentOS7
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work_dir" \
            -w /work_dir \
            centos:7 \
            /bin/bash -c "
              set -euo pipefail
              
              # 1. 修复 CentOS 7 基础源 (使用 Vault)
              rm -f /etc/yum.repos.d/*.repo
              printf '[base]\nname=CentOS-7 Base\nbaseurl=http://vault.centos.org/7.9.2009/os/x86_64/\nenabled=1\ngpgcheck=0\n' > /etc/yum.repos.d/CentOS-Base.repo
              
              # 2. 安装现代版 Git (解决 Git 1.8 不支持 filter 的问题)
              # 直接安装 inline 的 wandisco 仓库获取 Git 2.x
              yum install -y http://opensource.wandisco.com/centos/7/git/x86_64/wandisco-git-release-7-2.noarch.rpm || true
              yum install -y curl tar gzip gcc gcc-c++ make git findutils
              
              git --version # 验证版本需 > 2.0
              
              # 3. 下载并解压 Neovim v0.11.7
              curl -LO https://github.com/neovim/neovim-releases/releases/download/v0.11.7/nvim-linux-x86_64.tar.gz
              tar xzf nvim-linux-x86_64.tar.gz
              export PATH='/work_dir/nvim-linux-x86_64/bin:\$PATH'
              
              # 4. 准备 Neovim 环境路径
              export HOME=/root
              export XDG_CONFIG_HOME=\$HOME/.config
              export XDG_DATA_HOME=\$HOME/.local/share
              export XDG_STATE_HOME=\$HOME/.local/state
              
              mkdir -p \$XDG_CONFIG_HOME
              cp -r /work_dir/. \$XDG_CONFIG_HOME/nvim
              
              # 清理构建残留，保持包体积精简
              rm -rf \$XDG_CONFIG_HOME/nvim/nvim-linux-x86_64*
              rm -rf \$XDG_CONFIG_HOME/nvim/dist

              # 5. 自动化同步与 Tree-sitter 编译
              # 禁用 Git Filter 以确保在各种 Git 环境下的兼容性
              export NVIM_LAZY_NO_FILTER=1
              nvim --headless '+Lazy! sync' +qa
              # 此步骤会利用容器内的 GCC 编译出兼容 GLIBC 2.17 的 .so 文件
              nvim --headless '+TSUpdateSync' +qa

              # 6. 打包所有产物
              mkdir -p /work_dir/dist
              cd \$HOME
              tar -czf /work_dir/dist/lazynvim-centos7-bundle.tar.gz .config/nvim .local/share/nvim .local/state/nvim
              echo '--- 构建打包成功 ---'
            "

      - name: Create and upload Release
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name || format('manual-{0}', github.run_number) }}
        run: |
          gh release create "${TAG}" --title "LazyVim C7 Bundle (${TAG})" --notes "包含 Neovim v0.11.7 配置与离线插件包 (CentOS 7 兼容)" || true
          gh release upload "${TAG}" dist/lazynvim-centos7-bundle.tar.gz --clobber
